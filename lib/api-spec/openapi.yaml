openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Healthtrix Expense backend API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: lookups
  - name: reports
  - name: line-items
  - name: receipts
  - name: storage
  - name: manager
  - name: finance
  - name: payroll
  - name: admin
  - name: timeline

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /health:
    get:
      operationId: detailedHealthCheck
      tags: [health]
      summary: Detailed health check (includes DB ping)
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DetailedHealthStatus" }

  /auth/bootstrap-status:
    get:
      operationId: getBootstrapStatus
      tags: [auth]
      summary: Whether the System Admin bootstrap step has been completed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BootstrapStatus" }

  /auth/bootstrap:
    post:
      operationId: bootstrapAdmin
      tags: [auth]
      summary: Create the very first System Admin user (one-shot)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BootstrapBody" }
      responses:
        "201":
          description: Bootstrap complete; session established
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "409":
          description: Bootstrap already complete
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: "Admin-invoked: create a new user under the caller's org"
      description: |
        Distinct from `/auth/bootstrap`, which is one-shot for the very first
        System Admin. `/auth/register` lets an Accounting Admin or System
        Admin add additional users (employees, managers, finance approvers).
        The caller must be authenticated and authorized; the new user does
        not log in as a side effect.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserBody" }
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          description: Not signed in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
        "403":
          description: Caller lacks admin role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
        "409":
          description: Email already taken in this org
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Email + password login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginBody" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
        "429":
          description: Rate limited
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Destroy the current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current user + CSRF token
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "401":
          description: Not signed in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }

  /lookups/categories:
    get:
      operationId: listCategories
      tags: [lookups]
      summary: GL categories (employee-facing)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CategoryOption" }

  /lookups/departments:
    get:
      operationId: listDepartments
      tags: [lookups]
      summary: Departments
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Department" }

  /lookups/managers:
    get:
      operationId: listManagers
      tags: [lookups]
      summary: Active users eligible to manage / approve other employees
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ManagerOption" }

  /lookups/policy-rules:
    get:
      operationId: listPolicyRules
      tags: [lookups]
      summary: Effective policy rules visible to all signed-in users
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PolicyRule" }

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [users, admin]
      summary: List users
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
    post:
      operationId: adminCreateUser
      tags: [users, admin]
      summary: Invite/create a user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /admin/users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: adminUpdateUser
      tags: [users, admin]
      summary: Update a user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    delete:
      operationId: adminDeactivateUser
      tags: [users, admin]
      summary: Deactivate a user (soft delete)
      responses:
        "204":
          description: Deactivated

  /admin/gl-mappings:
    get:
      operationId: adminListGlMappings
      tags: [admin]
      summary: GL category mappings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GlMapping" }

  /admin/gl-mappings/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: adminUpdateGlMapping
      tags: [admin]
      summary: Update a GL mapping
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateGlMappingBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlMapping" }

  /admin/policy-rules:
    get:
      operationId: adminListPolicyRules
      tags: [admin]
      summary: List all policy rules for the caller's org
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PolicyRule" }
    patch:
      operationId: adminPatchPolicyRule
      tags: [admin]
      summary: Upsert a policy rule by name
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchPolicyRuleBody" }
      responses:
        "200":
          description: Upserted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyRule" }

  /admin/qbo-connection:
    get:
      operationId: adminGetQboConnection
      tags: [admin]
      summary: Get QuickBooks Online connection status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QboConnection" }

  /admin/qbo-connection/connect-stub:
    post:
      operationId: adminConnectQboStub
      tags: [admin]
      summary: |
        Establish a stubbed QuickBooks Online connection for development.
        Generates a fresh realm id and uses the caller's org name as the
        connected company name.
      responses:
        "200":
          description: Connected
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QboConnection" }

  /admin/qbo-connection/disconnect:
    post:
      operationId: adminDisconnectQbo
      tags: [admin]
      summary: Disconnect QuickBooks Online (stub or real-OAuth)
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QboConnection" }

  /admin/qbo-connection/credentials:
    put:
      operationId: adminSaveQboCredentials
      tags: [admin]
      summary: Save (encrypt) the org's Intuit Client ID + Secret + environment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SaveQboCredentialsBody" }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QboConnection" }

  /admin/qbo-connection/posting-preferences:
    put:
      operationId: adminSaveQboPostingPreferences
      tags: [admin]
      summary: Update QBO posting defaults (auto-post, memo template, payable acct)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QboPostingPreferencesBody" }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QboConnection" }

  /admin/qbo-connection/oauth/start:
    post:
      operationId: adminStartQboOauth
      tags: [admin]
      summary: Begin the Intuit OAuth flow (returns the authorization URL to open)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QboOauthStartResponse" }

  /admin/qbo-connection/preflight:
    post:
      operationId: adminPreflightQboConnection
      tags: [admin]
      summary: |
        Run a dry-run validation of the org's QBO setup BEFORE the OAuth
        handshake. Surfaces a checklist of pass/warn/fail items so the
        admin can self-diagnose configuration issues (missing encryption
        key, undecryptable stored credentials, unreachable Intuit
        environment, unrecognized Client ID, etc.).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QboPreflightResult" }

  /admin/qbo-connection/refresh-token:
    post:
      operationId: adminRefreshQboToken
      tags: [admin]
      summary: Force a token refresh against Intuit
      responses:
        "200":
          description: Refreshed (or refresh attempt persisted to health log)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QboConnection" }

  /admin/qbo-connection/health:
    get:
      operationId: adminGetQboConnectionHealth
      tags: [admin]
      summary: |
        Detailed connection health for the org (status, mode, environment,
        token expiry timestamps, last refresh outcome, last successful /
        failed post, and the last few token-refresh log entries).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QboConnectionHealth" }

  /admin/qbo-connection/posting-history:
    get:
      operationId: adminListQboPostingHistory
      tags: [admin]
      summary: Recent QBO posting events (success + failure)
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QboPostingHistoryItem" }

  /admin/qbo-connection/accounts:
    get:
      operationId: adminListQboAccounts
      tags: [admin]
      summary: List the org's QBO Chart of Accounts (cached, real-only)
      parameters:
        - in: query
          name: refresh
          required: false
          schema: { type: boolean, default: false }
        - in: query
          name: q
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QboAccount" }

  /admin/qbo-tags:
    get:
      operationId: adminListQboTags
      tags: [admin]
      summary: List org-wide QBO tags
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QboTag" }
    post:
      operationId: adminCreateQboTag
      tags: [admin]
      summary: Create a new QBO tag
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateQboTagBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QboTag" }

  /admin/qbo-tags/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: adminUpdateQboTag
      tags: [admin]
      summary: Update a QBO tag
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateQboTagBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QboTag" }
    delete:
      operationId: adminDeleteQboTag
      tags: [admin]
      summary: Delete a QBO tag
      responses:
        "204":
          description: Deleted

  /qbo-tags:
    get:
      operationId: listActiveQboTags
      tags: [reports]
      summary: List active QBO tags (catalog) for the report tag picker
      description: |
        Non-admin endpoint that returns active org-wide QBO tags so the
        Report Tag Picker on report-detail pages can show the catalog to
        employees and finance users without granting them admin scope.
        Inactive tags are filtered out — admins manage those via
        `GET /admin/qbo-tags`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QboTag" }

  /reports/{id}/tags:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listReportTags
      tags: [reports]
      summary: List the QBO tags applied to a report
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QboTag" }
    put:
      operationId: setReportTags
      tags: [reports]
      summary: Replace the set of QBO tags applied to a report
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetReportTagsBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QboTag" }

  /admin/delegations:
    get:
      operationId: adminListDelegations
      tags: [admin]
      summary: List manager delegations for the org (active or all)
      parameters:
        - in: query
          name: activeOnly
          required: false
          schema: { type: boolean, default: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ManagerDelegation" }
    post:
      operationId: adminCreateDelegation
      tags: [admin]
      summary: Authorize manager B to act on behalf of manager A
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDelegationBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManagerDelegation" }

  /admin/delegations/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    delete:
      operationId: adminRevokeDelegation
      tags: [admin]
      summary: Revoke an active delegation
      responses:
        "204":
          description: Revoked

  /admin/audit-log:
    get:
      operationId: adminAuditLog
      tags: [admin]
      summary: Merged audit trail (workflow actions + content edits)
      description: >-
        Returns workflow status transitions (`approval_actions`) and
        field-level content edits (`audit_entries`) interleaved by
        `createdAt` descending. Filter by `reportId` to scope to one
        report.
      parameters:
        - in: query
          name: reportId
          required: false
          schema: { type: string, format: uuid }
        - in: query
          name: category
          required: false
          description: >-
            Filter content edits by category. `report` returns
            report/line-item/receipt edits; `qbo` returns QBO
            config/tag/mapping/posting events. Approval rows are
            included only when `category=report` or omitted.
          schema:
            type: string
            enum: [report, qbo]
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChangeFeedItem" }

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List expense reports the caller can see
      parameters:
        - in: query
          name: scope
          schema:
            type: string
            enum: [mine, manager, finance, payroll, all]
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExpenseReportSummary" }
    post:
      operationId: createReport
      tags: [reports]
      summary: Create a draft expense report
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateReportBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpenseReport" }

  /reports/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a single report with line items and receipts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpenseReport" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
    patch:
      operationId: updateReport
      tags: [reports]
      summary: >-
        Edit report header fields. Allowed for the report owner, the
        owner's direct manager, and active manager delegates while the
        report is in any pre-Finance-Approved status (Draft, Submitted,
        Manager Review, Changes Requested, Manager Approved, Finance
        Review). Locked at Finance Approved and beyond.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateReportBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpenseReport" }
    delete:
      operationId: deleteReport
      tags: [reports]
      summary: Delete a Draft report
      responses:
        "204":
          description: Deleted

  /reports/{id}/submit:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: submitReport
      tags: [reports]
      summary: Submit Draft / Changes Requested report for review
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpenseReport" }

  /reports/{id}/recall:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: recallReport
      tags: [reports]
      summary: Recall (withdraw) a submitted report back to Draft
      responses:
        "200":
          description: Recalled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpenseReport" }

  /reports/{id}/void:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: voidReport
      tags: [reports]
      summary: Void a report (terminal Voided status)
      description: >-
        Owner can void their own Draft or Changes Requested report.
        Accounting Admin / System Admin can void any pre-payroll status.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VoidReportBody" }
      responses:
        "200":
          description: Voided
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpenseReport" }

  /reports/{id}/timeline:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getReportTimeline
      tags: [timeline]
      summary: Merged change history for a report
      description: >-
        Returns workflow status transitions and field-level content edits
        for the report, interleaved by `createdAt` ascending so the UI
        can render a single chronological feed.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChangeFeedItem" }

  /reports/{id}/lines:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listLineItems
      tags: [line-items]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LineItem" }
    post:
      operationId: createLineItem
      tags: [line-items]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateLineItemBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LineItem" }

  /lines/{lineId}:
    parameters:
      - in: path
        name: lineId
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateLineItem
      tags: [line-items]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateLineItemBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LineItem" }
    delete:
      operationId: deleteLineItem
      tags: [line-items]
      responses:
        "204":
          description: Deleted

  /lines/{lineId}/receipts:
    parameters:
      - in: path
        name: lineId
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: attachReceiptToLine
      tags: [receipts]
      summary: Attach an uploaded receipt object to a specific line item
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterReceiptBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Receipt" }

  /reports/{id}/receipts:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listReceipts
      tags: [receipts]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Receipt" }
    post:
      operationId: registerReceipt
      tags: [receipts]
      summary: Register a receipt object after a successful presigned upload
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterReceiptBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Receipt" }

  /receipts/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateReceipt
      tags: [receipts]
      summary: Update receipt metadata (currently only line item attachment)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateReceiptBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Receipt" }
        "400":
          description: Invalid update (line not on this report, etc.)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
        "403":
          description: Caller cannot edit this receipt
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404":
          description: Receipt not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
    delete:
      operationId: deleteReceipt
      tags: [receipts]
      responses:
        "204":
          description: Deleted

  /receipts/{id}/download-url:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getReceiptDownloadUrl
      tags: [receipts]
      summary: Short-lived signed GET URL for the underlying object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReceiptDownloadUrlResponse" }
        "403":
          description: Caller cannot view the parent report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404":
          description: Receipt not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }

  /receipts/upload-url:
    post:
      operationId: requestUploadUrl
      tags: [receipts]
      summary: Request a presigned upload URL for a receipt
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RequestUploadUrlBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequestUploadUrlResponse" }
        "413":
          description: Receipt exceeds 10 MB
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }
        "415":
          description: Unsupported content type
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Problem" }

  /approvals/manager-queue:
    get:
      operationId: managerQueue
      tags: [manager]
      summary: Reports awaiting the caller's manager review
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExpenseReportSummary" }

  /reports/{id}/manager-approve:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: managerApprove
      tags: [manager]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApprovalActionBody" }
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpenseReport" }

  /reports/{id}/request-changes:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: managerRequestChanges
      tags: [manager]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApprovalActionBody" }
      responses:
        "200":
          description: Changes requested
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpenseReport" }

  /reports/{id}/reject:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: managerReject
      tags: [manager]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApprovalActionBody" }
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpenseReport" }

  /approvals/finance-queue:
    get:
      operationId: financeQueue
      tags: [finance]
      summary: Reports awaiting Finance review
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExpenseReportSummary" }

  /reports/{id}/finance-approve:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: financeApprove
      tags: [finance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApprovalActionBody" }
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpenseReport" }

  /reports/{id}/finance-reject:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: financeReject
      tags: [finance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApprovalActionBody" }
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpenseReport" }

  /reports/{id}/gl-preview:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getGlPreview
      tags: [finance]
      summary: Preview the QuickBooks JournalEntry that will be posted
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlPreview" }

  /reports/{id}/post-to-qbo:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: postToQuickbooks
      tags: [finance]
      summary: Post an Approved report to QuickBooks (stub)
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApprovalActionBody" }
      responses:
        "200":
          description: Posted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostToQuickbooksResponse" }

  /reports/{id}/retry-qbo:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: retryQuickbooksPost
      tags: [finance]
      summary: Retry a Sync Error report posting
      responses:
        "200":
          description: Retried
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostToQuickbooksResponse" }

  /payroll/queue:
    get:
      operationId: payrollQueue
      tags: [payroll]
      summary: Reports ready for payroll reimbursement
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExpenseReportSummary" }

  /payroll/batches:
    get:
      operationId: listPayrollBatches
      tags: [payroll]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PayrollBatch" }
    post:
      operationId: createPayrollBatch
      tags: [payroll]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePayrollBatchBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayrollBatch" }

  /payroll/batches/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getPayrollBatch
      tags: [payroll]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayrollBatch" }

  /payroll/batches/{id}/mark-paid:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: markPayrollBatchPaid
      tags: [payroll]
      summary: Mark all reports in batch as Paid Through Payroll
      responses:
        "200":
          description: Paid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayrollBatch" }

  /payroll/batches/{id}/reconcile:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: reconcilePayrollBatch
      tags: [payroll]
      summary: Reconcile a paid batch against actuals
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReconcileBatchBody" }
      responses:
        "200":
          description: Reconciled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayrollBatch" }

components:
  schemas:
    Problem:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        code: { type: string, description: "Stable machine-readable error code" }
        detail: { type: string }
        instance: { type: string }
      required: [title, status, code]

    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    DetailedHealthStatus:
      type: object
      properties:
        ok: { type: boolean }
        db: { type: string, enum: [connected, disconnected] }
        version: { type: string }
      required: [ok, db]

    BootstrapStatus:
      type: object
      properties:
        bootstrapped: { type: boolean }
      required: [bootstrapped]

    BootstrapBody:
      type: object
      properties:
        orgName: { type: string, minLength: 1 }
        fullName: { type: string, minLength: 1 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
      required: [orgName, fullName, email, password]

    LoginBody:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }
      required: [email, password]

    AuthSession:
      type: object
      properties:
        user: { $ref: "#/components/schemas/User" }
        csrfToken: { type: string }
        sessionExpiresAt: { type: string, format: date-time }
        sessionToken:
          type: ["string", "null"]
          description: Only returned when client header indicates a non-cookie client (iOS).
      required: [user, csrfToken, sessionExpiresAt]

    Role:
      type: string
      enum:
        - Employee
        - Manager Approver
        - Finance Approver
        - Accounting Admin
        - System Admin

    WorkflowStatus:
      type: string
      enum:
        - Draft
        - Submitted
        - Manager Review
        - Changes Requested
        - Manager Approved
        - Finance Review
        - Finance Approved
        - Posted to QuickBooks
        - Ready for Payroll Reimbursement
        - Paid Through Payroll
        - Reconciled
        - Rejected
        - Voided
        - Sync Error

    PaymentMethod:
      type: string
      enum: [Personal Card, Cash, Company Card]

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        fullName: { type: string }
        title: { type: ["string", "null"] }
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
          minItems: 1
          uniqueItems: true
        isAlsoEmployee: { type: boolean }
        isActive: { type: boolean }
        departmentId: { type: ["string", "null"], format: uuid }
        departmentName: { type: ["string", "null"] }
        managerId: { type: ["string", "null"], format: uuid }
        managerName: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - email
        - fullName
        - roles
        - isAlsoEmployee
        - isActive
        - createdAt

    CreateUserBody:
      type: object
      properties:
        email: { type: string, format: email }
        fullName: { type: string, minLength: 1 }
        title: { type: ["string", "null"] }
        password: { type: string, minLength: 8 }
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
          minItems: 1
          uniqueItems: true
        isAlsoEmployee: { type: boolean }
        departmentId: { type: ["string", "null"], format: uuid }
        managerId: { type: ["string", "null"], format: uuid }
      required: [email, fullName, password, roles]

    UpdateUserBody:
      type: object
      properties:
        fullName: { type: string }
        title: { type: ["string", "null"] }
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
          minItems: 1
          uniqueItems: true
        isAlsoEmployee: { type: boolean }
        departmentId: { type: ["string", "null"], format: uuid }
        managerId: { type: ["string", "null"], format: uuid }
        isActive: { type: boolean }
        password: { type: ["string", "null"], minLength: 8 }

    CategoryOption:
      type: object
      properties:
        code: { type: string }
        qboAccount: { type: string }
        active: { type: boolean }
      required: [code, qboAccount, active]

    Department:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
      required: [id, name]

    PolicyRule:
      type: object
      properties:
        name: { type: string }
        value: {}
        description: { type: ["string", "null"] }
        updatedAt: { type: string, format: date-time }
      required: [name, value, updatedAt]

    PatchPolicyRuleBody:
      type: object
      description: >
        Upserts a policy rule by name within the caller's org. If a rule with
        the given name does not exist, it is created; otherwise its value
        and (optionally) description are replaced.
      properties:
        name: { type: string, minLength: 1 }
        value: {}
        description: { type: ["string", "null"] }
      required: [name, value]

    ManagerDelegation:
      type: object
      properties:
        id: { type: string, format: uuid }
        fromManagerId: { type: string, format: uuid }
        fromManagerName: { type: string }
        toManagerId: { type: string, format: uuid }
        toManagerName: { type: string }
        startsAt: { type: string, format: date-time }
        endsAt: { type: ["string", "null"], format: date-time }
        reason: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        revokedAt: { type: ["string", "null"], format: date-time }
      required:
        [
          id,
          fromManagerId,
          fromManagerName,
          toManagerId,
          toManagerName,
          startsAt,
          createdAt,
        ]

    CreateDelegationBody:
      type: object
      properties:
        fromManagerId: { type: string, format: uuid }
        toManagerId: { type: string, format: uuid }
        startsAt: { type: ["string", "null"], format: date-time }
        endsAt: { type: ["string", "null"], format: date-time }
        reason: { type: ["string", "null"] }
      required: [fromManagerId, toManagerId]

    VoidReportBody:
      type: object
      properties:
        comment: { type: ["string", "null"] }

    GlMapping:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        qboAccount: { type: string }
        qboAccountId: { type: ["string", "null"] }
        qboAccountType: { type: ["string", "null"] }
        active: { type: boolean }
      required: [id, code, qboAccount, active]

    UpdateGlMappingBody:
      type: object
      properties:
        qboAccount: { type: string }
        qboAccountId: { type: ["string", "null"] }
        qboAccountType: { type: ["string", "null"] }
        active: { type: boolean }

    QboConnection:
      type: object
      properties:
        status:
          type: string
          enum: [connected, disconnected, error]
        mode:
          type: string
          enum: [stub, real]
          description: >-
            "stub" = simulated demo connection. "real" = the org has stored
            Intuit Client credentials (live posting requires status=connected).
        environment:
          type: string
          enum: [sandbox, production]
        # True iff QBO_CREDENTIAL_ENCRYPTION_KEY is set on the server. When
        # false, the admin UI surfaces a prominent banner: credentials
        # cannot be saved until the env var is configured.
        encryptionKeyConfigured: { type: boolean }
        connectionHealth:
          type: string
          enum: [healthy, refresh_failed, reconnect_required, disconnected]
        realmId: { type: ["string", "null"] }
        companyName: { type: ["string", "null"] }
        connectedAt: { type: ["string", "null"], format: date-time }
        lastSyncAt: { type: ["string", "null"], format: date-time }
        lastSyncError: { type: ["string", "null"] }
        # Real-mode credential bookkeeping (never returns the plaintext).
        hasClientId: { type: boolean }
        hasClientSecret: { type: boolean }
        clientIdMasked: { type: ["string", "null"] }
        tokenExpiresAt: { type: ["string", "null"], format: date-time }
        refreshTokenExpiresAt:
          type: ["string", "null"]
          format: date-time
        lastTokenRefreshAt: { type: ["string", "null"], format: date-time }
        lastTokenRefreshError: { type: ["string", "null"] }
        lastSuccessfulPostAt: { type: ["string", "null"], format: date-time }
        lastFailedPostAt: { type: ["string", "null"], format: date-time }
        # Posting preferences.
        autoPostOnApproval: { type: boolean }
        defaultMemoTemplate: { type: ["string", "null"] }
        defaultPayableAccountId: { type: ["string", "null"] }
        defaultPayableAccountName: { type: ["string", "null"] }
      required:
        - status
        - mode
        - environment
        - encryptionKeyConfigured
        - connectionHealth
        - hasClientId
        - hasClientSecret
        - autoPostOnApproval

    QboPreflightCheckStatus:
      type: string
      enum: [pass, warn, fail]

    QboPreflightCheck:
      type: object
      description: A single line in the preflight checklist.
      properties:
        id:
          type: string
          description: Stable identifier for the check (e.g. encryption_key).
        label:
          type: string
          description: Human-readable label rendered in the UI.
        status: { $ref: "#/components/schemas/QboPreflightCheckStatus" }
        detail:
          type: ["string", "null"]
          description: Optional explanatory text shown below the row.
      required: [id, label, status]

    QboPreflightResult:
      type: object
      description: >-
        Result of a dry-run preflight against the org's saved QBO setup.
        Used by the Configuration card "Test configuration" button.
      properties:
        encryptionKeyConfigured: { type: boolean }
        resolvedRedirectUri:
          type: string
          description: >-
            The exact OAuth redirect URI the server will send to Intuit.
            Must be registered verbatim in the Intuit developer portal.
        environment:
          type: string
          enum: [sandbox, production]
        checks:
          type: array
          items: { $ref: "#/components/schemas/QboPreflightCheck" }
      required:
        - encryptionKeyConfigured
        - resolvedRedirectUri
        - environment
        - checks

    UpdateQboConnectionBody:
      type: object
      properties:
        action:
          type: string
          enum: [connect, disconnect]
      required: [action]

    SaveQboCredentialsBody:
      type: object
      description: >-
        Store the org's Intuit Client ID + Client Secret encrypted at rest.
        Pass `null` for either field to clear it. The plaintext is never
        echoed back; only `hasClientId`/`clientIdMasked` etc are returned.
      properties:
        environment:
          type: string
          enum: [sandbox, production]
        clientId:
          type: ["string", "null"]
          description: Plaintext Client ID (or null to clear).
        clientSecret:
          type: ["string", "null"]
          description: Plaintext Client Secret (or null to clear).
      required: [environment]

    QboPostingPreferencesBody:
      type: object
      properties:
        autoPostOnApproval: { type: boolean }
        defaultMemoTemplate: { type: ["string", "null"] }
        defaultPayableAccountId: { type: ["string", "null"] }
        defaultPayableAccountName: { type: ["string", "null"] }

    QboOauthStartResponse:
      type: object
      properties:
        url: { type: string, format: uri }
      required: [url]

    QboPostingHistoryItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        reportId: { type: string, format: uuid }
        reportDisplayCode: { type: string }
        status:
          type: string
          enum: [posted, retried, error]
          description: >-
            "posted" = first successful post, "retried" = succeeded after a
            previous Sync Error on the same report, "error" = the post failed.
        journalId: { type: string }
        qboJournalId: { type: ["string", "null"] }
        # Environment of the connection at posting time. Used by the UI to
        # build a deep-link to the journal entry inside QBO (sandbox vs
        # production console).
        environment:
          type: string
          enum: [sandbox, production]
        realmId: { type: ["string", "null"] }
        attachableCount: { type: integer }
        tagsSent:
          type: array
          items: { type: string }
        errorMessage: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - reportId
        - reportDisplayCode
        - status
        - journalId
        - environment
        - attachableCount
        - tagsSent
        - createdAt

    QboTokenRefreshLogItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        success: { type: boolean }
        errorMessage: { type: ["string", "null"] }
        expiresInSeconds: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, success, createdAt]

    QboConnectionHealth:
      type: object
      description: >-
        Detailed connection health snapshot used by the admin Health card.
        Includes everything the QboConnection summary exposes plus the most
        recent token-refresh attempts.
      properties:
        mode:
          type: string
          enum: [stub, real]
        status:
          type: string
          enum: [connected, disconnected, error]
        health:
          type: string
          enum: [healthy, refresh_failed, reconnect_required, disconnected]
        environment:
          type: string
          enum: [sandbox, production]
        realmId: { type: ["string", "null"] }
        companyName: { type: ["string", "null"] }
        hasCredentials: { type: boolean }
        tokenExpiresAt: { type: ["string", "null"], format: date-time }
        refreshTokenExpiresAt:
          type: ["string", "null"]
          format: date-time
        lastTokenRefreshAt: { type: ["string", "null"], format: date-time }
        lastTokenRefreshError: { type: ["string", "null"] }
        lastSuccessfulPostAt: { type: ["string", "null"], format: date-time }
        lastFailedPostAt: { type: ["string", "null"], format: date-time }
        recentRefreshAttempts:
          type: array
          items: { $ref: "#/components/schemas/QboTokenRefreshLogItem" }
      required:
        - mode
        - status
        - health
        - environment
        - hasCredentials
        - recentRefreshAttempts

    QboAccount:
      type: object
      description: An entry from the org's QBO Chart of Accounts (cached).
      properties:
        id: { type: string }
        name: { type: string }
        fullyQualifiedName: { type: string }
        accountType: { type: string }
        accountSubType: { type: ["string", "null"] }
        classification: { type: ["string", "null"] }
        active: { type: boolean }
      required:
        - id
        - name
        - fullyQualifiedName
        - accountType
        - active

    QboTag:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        color: { type: ["string", "null"] }
        active: { type: boolean }
      required: [id, name, active]

    CreateQboTagBody:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        color: { type: ["string", "null"] }
      required: [name]

    UpdateQboTagBody:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        color: { type: ["string", "null"] }
        active: { type: boolean }

    SetReportTagsBody:
      type: object
      properties:
        tagIds:
          type: array
          items: { type: string, format: uuid }
      required: [tagIds]

    ExpenseReportSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        displayCode: { type: string }
        title: { type: string }
        employee: { $ref: "#/components/schemas/UserRef" }
        departmentName: { type: ["string", "null"] }
        period: { type: ["string", "null"] }
        status: { $ref: "#/components/schemas/WorkflowStatus" }
        total: { type: string, description: "Decimal as string" }
        lineCount: { type: integer }
        receiptCount: { type: integer }
        needsReceipt: { type: boolean }
        submittedAt: { type: ["string", "null"], format: date-time }
        ageDays: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - displayCode
        - title
        - employee
        - status
        - total
        - lineCount
        - receiptCount
        - needsReceipt
        - ageDays
        - createdAt
        - updatedAt

    UserRef:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
          minItems: 1
          uniqueItems: true
      required: [id, fullName, roles]

    ManagerOption:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        email: { type: string, format: email }
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
          minItems: 1
          uniqueItems: true
      required: [id, fullName, email, roles]

    ExpenseReport:
      type: object
      properties:
        id: { type: string, format: uuid }
        displayCode: { type: string }
        title: { type: string }
        description: { type: string }
        employee: { $ref: "#/components/schemas/UserRef" }
        departmentId: { type: ["string", "null"], format: uuid }
        departmentName: { type: ["string", "null"] }
        policy: { type: string }
        periodStart: { type: ["string", "null"], format: date }
        periodEnd: { type: ["string", "null"], format: date }
        status: { $ref: "#/components/schemas/WorkflowStatus" }
        total: { type: string }
        submittedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        lineItems:
          type: array
          items: { $ref: "#/components/schemas/LineItem" }
        receipts:
          type: array
          items: { $ref: "#/components/schemas/Receipt" }
        editedSinceLastApproval:
          type: boolean
          description: >-
            True when at least one field-level content edit has been
            recorded *after* the most recent approval action on this
            report (or after creation when no approvals exist yet, except
            for the initial draft state). Surfaces an "Edited since last
            approval" banner on the manager / finance review pages so
            reviewers can see a re-edit happened without forcing a
            status auto-reset.
        tags:
          type: array
          description: >-
            QBO tags currently applied to this report. Sent on the next
            JournalEntry post.
          items: { $ref: "#/components/schemas/QboTag" }
      required:
        - id
        - displayCode
        - title
        - description
        - employee
        - policy
        - status
        - total
        - createdAt
        - updatedAt
        - lineItems
        - receipts
        - editedSinceLastApproval
        - tags

    CreateReportBody:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        departmentId: { type: ["string", "null"], format: uuid }
        policy: { type: ["string", "null"] }
        periodStart: { type: ["string", "null"], format: date }
        periodEnd: { type: ["string", "null"], format: date }
      required: [title]

    UpdateReportBody:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        departmentId: { type: ["string", "null"], format: uuid }
        policy: { type: string }
        periodStart: { type: ["string", "null"], format: date }
        periodEnd: { type: ["string", "null"], format: date }

    LineItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        reportId: { type: string, format: uuid }
        occurredOn: { type: string, format: date }
        merchant: { type: string }
        description: { type: string }
        category: { type: string }
        amount: { type: string }
        paymentMethod: { $ref: "#/components/schemas/PaymentMethod" }
        needsReview: { type: boolean }
        receiptCount: { type: integer }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - reportId
        - occurredOn
        - merchant
        - description
        - category
        - amount
        - paymentMethod
        - needsReview
        - receiptCount
        - createdAt

    CreateLineItemBody:
      type: object
      properties:
        occurredOn: { type: string, format: date }
        merchant: { type: string, minLength: 1 }
        description: { type: string }
        category: { type: string, minLength: 1 }
        amount: { type: string }
        paymentMethod: { $ref: "#/components/schemas/PaymentMethod" }
      required: [occurredOn, merchant, category, amount, paymentMethod]

    UpdateLineItemBody:
      type: object
      properties:
        occurredOn: { type: string, format: date }
        merchant: { type: string }
        description: { type: string }
        category: { type: string }
        amount: { type: string }
        paymentMethod: { $ref: "#/components/schemas/PaymentMethod" }

    Receipt:
      type: object
      properties:
        id: { type: string, format: uuid }
        reportId: { type: ["string", "null"], format: uuid }
        lineItemId: { type: ["string", "null"], format: uuid }
        objectPath: { type: string }
        filename: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        uploadedById: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - objectPath
        - filename
        - mimeType
        - sizeBytes
        - uploadedById
        - createdAt

    RegisterReceiptBody:
      type: object
      properties:
        objectPath: { type: string }
        filename: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        lineItemId: { type: ["string", "null"], format: uuid }
      required: [objectPath, filename, mimeType, sizeBytes]

    UpdateReceiptBody:
      type: object
      description: >
        Update mutable receipt metadata. Only `lineItemId` is currently
        supported — pass a line ID on the same report to attach, or `null`
        to detach. Receipts can only be updated while the parent report is
        editable (Draft or Changes Requested).
      properties:
        lineItemId: { type: ["string", "null"], format: uuid }
      required: [lineItemId]

    RequestUploadUrlBody:
      type: object
      properties:
        reportId: { type: string, format: uuid, description: "Owning report" }
        name: { type: string }
        size: { type: integer, description: "Bytes; max 10485760 (10 MB)" }
        contentType:
          type: string
          description: "Allowed: image/jpeg, image/png, image/heic, application/pdf"
      required: [reportId, name, size, contentType]

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL: { type: string, description: "Time-limited signed PUT URL" }
        objectPath:
          type: string
          description: "/objects/<receiptId>.<ext>; pass back to register the receipt"
        receiptId: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time }
      required: [uploadURL, objectPath, receiptId, expiresAt]

    ReceiptDownloadUrlResponse:
      type: object
      properties:
        downloadURL: { type: string, description: "Time-limited signed GET URL" }
        expiresAt: { type: string, format: date-time }
      required: [downloadURL, expiresAt]

    ApprovalActionBody:
      type: object
      properties:
        comment: { type: ["string", "null"] }

    ApprovalAction:
      type: object
      properties:
        id: { type: string, format: uuid }
        reportId: { type: string, format: uuid }
        actor: { $ref: "#/components/schemas/UserRef" }
        actorRoles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
          minItems: 1
          uniqueItems: true
        fromStatus: { $ref: "#/components/schemas/WorkflowStatus" }
        toStatus: { $ref: "#/components/schemas/WorkflowStatus" }
        comment: { type: ["string", "null"] }
        metadata: { type: ["string", "null"] }
        sequence: { type: integer }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - reportId
        - actor
        - actorRoles
        - fromStatus
        - toStatus
        - sequence
        - createdAt

    AuditFieldDiff:
      type: object
      description: >-
        One field-level change. `before` and `after` are the column's
        prior and new values, JSON-serialized. For "created" entries
        `before` is null; for "deleted" entries `after` is null.
      properties:
        field: { type: string }
        before: {}
        after: {}
      required: [field, before, after]

    AuditEntry:
      type: object
      description: >-
        A field-level content edit on a report or one of its children
        (line item, receipt) — or, when `category=qbo`, a change to an
        org-wide QBO config, tag, GL mapping, or posting event.
        Approval/status transitions live in `ApprovalAction`; merge them
        via `ChangeFeedItem`.
      properties:
        id: { type: string, format: uuid }
        reportId:
          type: string
          format: uuid
          nullable: true
          description: >-
            Null for QBO config/tag/mapping/posting events that are not
            tied to a single report.
        actor: { $ref: "#/components/schemas/UserRef" }
        actorRoles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
          minItems: 1
          uniqueItems: true
        category:
          type: string
          enum: [report, qbo]
          default: report
        entityType:
          type: string
          enum:
            - report
            - line_item
            - receipt
            - qbo_config
            - qbo_tag
            - qbo_mapping
            - qbo_posting
        entityId: { type: string, format: uuid }
        action:
          type: string
          enum: [created, updated, deleted]
        fieldDiffs:
          type: array
          items: { $ref: "#/components/schemas/AuditFieldDiff" }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - reportId
        - actor
        - actorRoles
        - category
        - entityType
        - entityId
        - action
        - fieldDiffs
        - createdAt

    ChangeFeedItem:
      type: object
      description: >-
        Discriminated wrapper for the merged change-history feed used by
        `getReportTimeline` and `adminAuditLog`. `kind=approval` carries
        an `ApprovalAction`; `kind=content` carries an `AuditEntry`.
      properties:
        kind:
          type: string
          enum: [approval, content]
        createdAt: { type: string, format: date-time }
        approval:
          oneOf:
            - $ref: "#/components/schemas/ApprovalAction"
            - { type: "null" }
        content:
          oneOf:
            - $ref: "#/components/schemas/AuditEntry"
            - { type: "null" }
      required: [kind, createdAt]

    GlPreviewLine:
      type: object
      properties:
        account: { type: string }
        accountId:
          type: ["string", "null"]
          description: >-
            Durable QBO Chart-of-Accounts Id, when the GL mapping has been
            linked to a real account. Posting payloads prefer this over the
            name because Intuit matches AccountRef by `value` (Id).
        category: { type: string }
        amount: { type: string }
      required: [account, category, amount]

    GlPreview:
      type: object
      properties:
        reportId: { type: string, format: uuid }
        displayCode: { type: string }
        journalDate: { type: string, format: date }
        memo: { type: string }
        debits:
          type: array
          items: { $ref: "#/components/schemas/GlPreviewLine" }
        credits:
          type: array
          items: { $ref: "#/components/schemas/GlPreviewLine" }
        totalDebits: { type: string }
        totalCredits: { type: string }
        currency: { type: string }
      required:
        - reportId
        - displayCode
        - journalDate
        - memo
        - debits
        - credits
        - totalDebits
        - totalCredits
        - currency

    PostToQuickbooksResponse:
      type: object
      properties:
        report: { $ref: "#/components/schemas/ExpenseReport" }
        journalId: { type: ["string", "null"] }
        status:
          type: string
          enum: [posted, error]
        errorMessage: { type: ["string", "null"] }
      required: [report, status]

    PayrollBatchItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        reportId: { type: string, format: uuid }
        report: { $ref: "#/components/schemas/ExpenseReportSummary" }
        amount: { type: string }
      required: [id, reportId, report, amount]

    ReconciliationRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        reportId: { type: string, format: uuid }
        expectedAmount: { type: string }
        paidAmount: { type: string }
        variance: { type: string }
        flag:
          type: string
          enum: [matched, under, over, partial, missing]
        note: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - reportId
        - expectedAmount
        - paidAmount
        - variance
        - flag
        - createdAt

    PayrollBatch:
      type: object
      properties:
        id: { type: string, format: uuid }
        label: { type: string }
        status:
          type: string
          enum: [Draft, Marked Paid, Reconciled]
        total: { type: string }
        paidAt: { type: ["string", "null"], format: date-time }
        reconciledAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        items:
          type: array
          items: { $ref: "#/components/schemas/PayrollBatchItem" }
        reconciliation:
          type: array
          items: { $ref: "#/components/schemas/ReconciliationRecord" }
      required:
        - id
        - label
        - status
        - total
        - createdAt
        - items
        - reconciliation

    CreatePayrollBatchBody:
      type: object
      description: >
        Creates a new payroll batch from EVERY report currently in
        "Ready for Payroll Reimbursement" status for the caller's org.
        The server collects the reports — clients do not pass IDs.
      properties:
        label: { type: string, minLength: 1 }
      required: [label]

    ReconcileBatchEntry:
      type: object
      properties:
        reportId: { type: string, format: uuid }
        paidAmount: { type: string }
        note: { type: ["string", "null"] }
      required: [reportId, paidAmount]

    ReconcileBatchBody:
      type: object
      properties:
        entries:
          type: array
          items: { $ref: "#/components/schemas/ReconcileBatchEntry" }
          minItems: 1
      required: [entries]
